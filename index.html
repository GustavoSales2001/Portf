<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio - Gustavo Sales</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background-image:url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1920&q=80");
  background-size:cover;
  background-position:50% 5%;
  background-attachment:fixed;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

.topo{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
}

.logo{
  color:#00ffcc;
  font-size:24px;
  font-weight:bold;
}

.menu{
  display:flex;
  gap:30px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.menu a:hover{
  color:#00ffcc;
}

.container{
  height:calc(100vh - 140px);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:rgba(20,20,20,0.95);
  border-radius:25px;
  padding:40px 30px;
  width:350px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,200,.3);
  animation:fadeIn 1.5s ease;
}

.card img{
  width:220px;
  height:220px;
  border-radius:50%;
  border:4px solid #00ffcc;
  object-fit:cover;
  object-position:50% 10%;
}

.card h1{
  color:white;
  margin-top:20px;
  font-size:26px;
}

.card p{
  color:#ccc;
  margin-top:8px;
  font-size:14px;
}

.social{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.social a{
  width:42px;
  height:42px;
  border:1px solid white;
  border-radius:50%;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:.3s;
}

.social a:hover{
  background:#00ffcc;
  color:black;
  transform:scale(1.1);
}

footer{
  background:rgba(10,10,10,0.95);
  border-top:2px solid #00ffcc;
  padding:20px;
  text-align:center;
  color:#ccc;
}

footer .footer-social{
  margin:10px 0;
  display:flex;
  justify-content:center;
  gap:15px;
}

footer .footer-social a{
  color:#00ffcc;
  font-size:18px;
  transition:.3s;
}

footer .footer-social a:hover{
  color:white;
  transform:scale(1.2);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

@media(max-width:600px){
  .menu{
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
  }
  .container{
    padding:20px;
  }
  .card{
    width:90%;
  }
}
</style>
</head>

<body>

<header class="topo">
  <div class="logo">Gustavo</div>

  <nav class="menu">
    <a href="https://gustavosales2001.github.io/sobre_mim/">Sobre</a>
    <a href="https://gustavosales2001.github.io/projetos/">Projetos</a>
    <a href="https://gustavosales2001.github.io/meus_certificados/">Certificados</a>
  </nav>
</header>

<div class="container">
  <div class="card">

    <img src="https://i.imgur.com/aS0H0KX.png" alt="Foto Gustavo">

    <h1>Gustavo Sales</h1>
    <p>Desenvolvedor Front-end & UI/UX</p>

    <div class="social">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-linkedin-in"></i></a>
      <a href="#"><i class="fab fa-github"></i></a>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Gustavo Sales - Todos os direitos reservados</p>

  <div class="footer-social">
    <a href="#"><i class="fab fa-linkedin"></i></a>
    <a href="#"><i class="fab fa-github"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
  </div>
</footer>

</body>
</html>
